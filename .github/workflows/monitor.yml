name: amazon-monitor

# Weekly run every Monday. GitHub cron is in UTC and may start a few minutes late.
# 11:00 Moldova summer (EEST, UTC+3) = 08:00 UTC  →  cron: "0 8 * * 1"
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

concurrency:
  group: amazon-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system fonts
        run: sudo apt-get install -y fonts-noto fonts-noto-color-emoji

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: python -m src.main

      - name: Upload PDF report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amazon-report-${{ github.run_id }}
          path: amazon_report_*.pdf
          retention-days: 30
          if-no-files-found: ignore
